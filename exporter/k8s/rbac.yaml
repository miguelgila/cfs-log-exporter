apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: cfs-log-exporter
  namespace: services
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: cfs-log-exporter
  namespace: services
subjects:
  - kind: ServiceAccount
    name: cfs-log-exporter
    namespace: services
roleRef:
  kind: Role
  name: cfs-log-exporter
  apiGroup: rbac.authorization.k8s.io
