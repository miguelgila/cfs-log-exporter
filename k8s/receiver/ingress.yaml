---
# Optional: expose the receiver UI via Ingress with TLS.
# Adjust the host, secretName, and issuer to match your environment.

apiVersion: cert-manager.io/v1
kind: Certificate
metadata:
  name: cfs-log-viewer-tls
  namespace: cfs-log-viewer
spec:
  secretName: cfs-log-viewer-tls
  commonName: cfs-log-viewer.example.com
  dnsNames:
    - cfs-log-viewer.example.com
  issuerRef:
    kind: ClusterIssuer
    name: letsencrypt  # adjust to your cluster issuer

---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: cfs-log-receiver
  namespace: cfs-log-viewer
  labels:
    app: cfs-log-receiver
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "0"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "900"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/client-body-buffer-size: "1m"
    cert-manager.io/cluster-issuer: letsencrypt
    nginx.ingress.kubernetes.io/force-ssl-redirect: "false"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - cfs-log-viewer.example.com
      secretName: cfs-log-viewer-tls
  rules:
    - host: cfs-log-viewer.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: cfs-log-receiver
                port:
                  number: 8000
