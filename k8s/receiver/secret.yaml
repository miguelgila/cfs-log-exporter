---
# API key shared between exporter and receiver.
# Must match the secret deployed alongside the exporter.
#
#   echo -n "my-secret-key" | base64
#
apiVersion: v1
kind: Secret
metadata:
  name: cfs-log-receiver
  namespace: cfs-log-viewer
type: Opaque
data:
  api-key: Y2hhbmdlbWU=  # "changeme" — replace this!
